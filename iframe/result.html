<!doctype html>
<html lang="zh-Hans">
<head>
    <title>时序图分析结果</title>
    <meta charset="utf-8" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            padding: 15px; 
            background: #1e1e1e; 
            color: #fff; 
            font-family: Consolas, monospace; 
            overflow: auto;
        }
        h2 { 
            color: #ffcc00; 
            margin-bottom: 10px; 
            text-align: center;
            font-size: 16px;
        }
        .result { 
            padding: 10px 12px; 
            background: #2a2a2a; 
            border-radius: 4px; 
            white-space: pre-line; 
            line-height: 1.4; 
            font-size: 12px; 
            margin-bottom: 15px;
        }
        .svg-container { 
            background: #2d2d2d; 
            border-radius: 8px; 
            padding: 10px; 
            overflow: auto;
        }
        #svgContent { 
            display: flex; 
            justify-content: center; 
        }
        #svgContent svg { 
            max-width: 100%; 
            height: auto; 
        }
        .debug { 
            color: #888; 
            font-size: 11px; 
            margin-top: 10px; 
            padding: 5px; 
            background: #252525; 
            border: 1px solid #444; 
        }
    </style>
</head>
<body>
    <h2>时序图分析结果</h2>
    <div class="result" id="resultText">加载中...</div>
    <div class="svg-container">
        <div id="svgContent"></div>
    </div>
    <div class="debug" id="debug"></div>
    
    <script>
        const debugEl = document.getElementById('debug');
        function log(msg) { debugEl.innerHTML += new Date().toLocaleTimeString() + ': ' + msg + '<br>'; }
        
        function showResult(data) {
            log('显示结果');
            if (data.info) {
                document.getElementById('resultText').textContent = data.info;
            }
            if (data.svg) {
                document.getElementById('svgContent').innerHTML = data.svg;
                log('SVG 已加载');
            }
        }
        
        // 方式1：从全局变量读取结果（最可靠）
        if (typeof eda !== 'undefined' && eda._timingResult && eda._timingResult.info) {
            log('从全局变量获取结果');
            showResult(eda._timingResult);
        } 
        // 方式2：通过 RPC 获取结果
        else if (typeof eda !== 'undefined' && eda.sys_MessageBus) {
            log('eda 可用，尝试 RPC');
            setTimeout(() => {
                log('调用 RPC getLatestResult');
                eda.sys_MessageBus.rpcCallPublic('getLatestResult', null, 10000).then(data => {
                    log('RPC 返回: ' + JSON.stringify(data).substring(0, 100));
                    if (data && data.info) {
                        showResult(data);
                    } else {
                        document.getElementById('resultText').textContent = '无法获取结果数据';
                    }
                }).catch(err => {
                    log('RPC 失败: ' + err);
                    document.getElementById('resultText').textContent = '加载失败: ' + err;
                });
            }, 1000);
            
            // 方式3：监听推送的结果数据
            eda.sys_MessageBus.subscribePublic('timingResultData', (data) => {
                log('收到推送结果: ' + JSON.stringify(data).substring(0, 100));
                if (data) {
                    showResult(data);
                }
            });
        } else {
            document.getElementById('resultText').textContent = 'eda 对象不可用';
        }
    </script>
</body>
</html>
